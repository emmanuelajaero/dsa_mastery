 "DP patterns", "snippet": "", "id": "dp-patterns", "page": "index.html", "pageTitle": "Home & Roadmap"}, {"text": "A 4-week study plan", "snippet": "- **Week 1 — Arrays/Strings/Lists:** Patterns 1–9. Two problems each.", "id": "a-4-week-study-plan", "page": "index.html", "pageTitle": "Home & Roadmap"}, {"text": "00 — Complexity Foundations & Data-Structure Cheat Sheet", "snippet": "> Before patterns, you need a feel for **cost**. This file gives you the Big-O", "id": "00--complexity-foundations--data-structure-cheat-sheet", "page": "00-complexity-foundations.html", "pageTitle": "0 · Complexity Foundations"}, {"text": "1. What Big-O actually measures", "snippet": "Big-O describes **how the running time (or memory) grows as the input `n` grows** —", "id": "1-what-big-o-actually-measures", "page": "00-complexity-foundations.html", "pageTitle": "0 · Complexity Foundations"}, {"text": "2. How to RECOGNIZE each complexity (pattern-matching cheat)", "snippet": "", "id": "2-how-to-recognize-each-complexity-pattern-matching-cheat", "page": "00-complexity-foundations.html", "pageTitle": "0 · Complexity Foundations"}, {"text": "3. Amortized vs worst case (one gotcha)", "snippet": "- **`list.append`** in Python is *amortized* `O(1)` — occasionally it resizes", "id": "3-amortized-vs-worst-case-one-gotcha", "page": "00-complexity-foundations.html", "pageTitle": "0 · Complexity Foundations"}, {"text": "4. Visualizing growth (relative steps for n = 100)", "snippet": "O(1)        | ▏ 1", "id": "4-visualizing-growth-relative-steps-for-n--100", "page": "00-complexity-foundations.html", "pageTitle": "0 · Complexity Foundations"}, {"text": "5. DATA-STRUCTURE OPERATION COSTS — memorize this", "snippet": "", "id": "5-data-structure-operation-costs--memorize-this", "page": "00-complexity-foundations.html", "pageTitle": "0 · Complexity Foundations"}, {"text": "6. Common algorithm complexities — memorize this", "snippet": "", "id": "6-common-algorithm-complexities--memorize-this", "page": " core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Worked example — Subarray Sum Equals K (LeetCode 560)", "snippet": "Count subarrays whose sum equals `k`. The trick: a running sum + a hash map of", "id": "worked-example--subarray-sum-equals-k-leetcode-560", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "subarray_sum([1, 1, 1], 2) -> 2", "snippet": "- Build: **`O(n)` time**, query: **`O(1)`**. Hash-map version: **`O(n)` time, `O(n)` space.**", "id": "subarray_sum1-1-1-2---2", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Complexity", "snippet": "- Build: **`O(n)` time**, query: **`O(1)`**. Hash-map version: **`O(n)` time, `O(n)` space.**", "id": "complexity", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Empty array:** handle `len(nums) == 0` before building the prefix.", "id": "-watch-out", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Practice", "snippet": "- Range Sum Query – Immutable (303), Contiguous Array (525), Subarray Sum Equals K (560).", "id": "practice", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "2. Two Pointers", "snippet": "> **Mnemonic:** *\"Squeeze from both ends.\"*", "id": "2-two-pointers", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Picture", "snippet": "On a **sorted** array, walk `left` up and `right` down based on the comparison.", "id": "picture-1", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "When to use", "snippet": "- **Sorted** input, find a pair/triplet meeting a condition.", "id": "when-to-use-1", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Template", "snippet": "def two_sum_sorted(nums, target):", "id": "template-1", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Worked example — 3Sum (LeetCode 15)", "snippet": "Fix one number, two-pointer the rest. Sorting enables both the scan and dedup.", "id": "worked-example--3sum-leetcode-15", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "three_sum([-1, 0, 1, 2, -1, -4]) -> [[-1, -1, 2], [-1, 0, 1]]", "snippet": "- Pair scan: **`O(n)`** time, **`O(1)`** space (plus `O(n log n)` if you must sort).", "id": "three_sum-1-0-1-2--1--4----1--1-2--1-0-1", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Complexity", "snippet": "- Pair scan: **`O(n)`** time, **`O(1)`** space (plus `O(n log n)` if you must sort).", "id": "complexity-1", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Input must be sorted** (or you sort first) — two pointers on unsorted data gives wrong answers.", "id": "-watch-out-1", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Practice", "snippet": "- Two Sum II (167), 3Sum (15), Container With Most Water (11).", "id": "practice-1", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "3. Sliding Window", "snippet": "> **Mnemonic:** *\"Grow right, shrink left, keep the best.\"*", "id": "3-sliding-window", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Picture", "snippet": "A window `[left, right]` slides across; expand to include, contract to stay valid.", "id": "picture-2", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "When to use", "snippet": "- **Contiguous** subarray/substring asking for max/min/longest/shortest.", "id": "when-to-use-2", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Template — fixed size", "snippet": "def max_sum_subarray(nums, k):", "id": "template--fixed-size", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Template — variable size", "s Minimum removals to make intervals non-overlapping → greedily keep earliest finishers.", "id": "merge_intervals13268101518---168101518", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Worked example — Non-overlapping Intervals (LeetCode 435)", "snippet": "Minimum removals to make intervals non-overlapping → greedily keep earliest finishers.", "id": "worked-example--non-overlapping-intervals-leetcode-435", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "erase_overlap_intervals([[1,2],[2,3],[3,4],[1,3]]) -> 1", "snippet": "- **`O(n log n)`** time (the sort dominates), **`O(n)`** space.", "id": "erase_overlap_intervals12233413---1", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Complexity", "snippet": "- **`O(n log n)`** time (the sort dominates), **`O(n)`** space.", "id": "complexity-7", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Single interval:** result is just that interval — make sure your loop still appends it.", "id": "-watch-out-7", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Practice", "snippet": "- Merge Intervals (56), Insert Interval (57), Non-Overlapping Intervals (435).", "id": "practice-7", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "9. Modified Binary Search", "snippet": "> **Mnemonic:** *\"Halve and conquer — even when the array is twisted.\"*", "id": "9-modified-binary-search", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Picture", "snippet": "Standard search halves the range. In a **rotated** array, one half is always sorted —", "id": "picture-8", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "When to use", "snippet": "- **Sorted / rotated** arrays; find target, boundary, first/last, or a peak.", "id": "when-to-use-8", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Template — classic + boundary", "snippet": "def binary_search(nums, target):", "id": "template--classic--boundary", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Worked example — Search in Rotated Sorted Array (LeetCode 33)", "snippet": "def search_rotated(nums, target):", "id": "worked-example--search-in-rotated-sorted-array-leetcode-33", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "search_rotated([4,5,6,7,0,1,2], 0) -> 4", "snippet": "- **`O(log n)`** time, **`O(1)`** space.", "id": "search_rotated4567012-0---4", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Complexity", "snippet": "- **`O(log n)`** time, **`O(1)`** space.", "id": "complexity-8", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Single element array:** `lo == hi == mid` — make sure you return it if it matches, not loop forever.", "id": "-watch-out-8", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Practice", "snippet": "- Search in Rotated Sorted Array (33), Find Minimum in Rotated Sorted Array (153), Search a 2D Matrix II (240).", "id": "practice-8", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "10. Binary Tree Traversal", "snippet": "> **Mnemonic:** *\"PIP — **P**re (root first), **I**n (root middle), **P**ost (root last).\"*", "id": "10-binary-tree-traversal", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Picture", "snippet": "Where you \"visit\" the root relative to its children defines the order.", "id": "picture-9", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "When to use", "snippet": "- **Inorder** → sorted order in a BST. **Preorder** → copy/serialize.", "id": "when-to-use-9", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Template", "snippet": "class TreeNode:", "id": "template-6", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Worked example — Kth Smallest in a BST (LeetCode 230)", "snippet": "Inorder yields ascending values; stop at the kth.", "id": "worked-example--kth-smallest-in-a-bst-leetcode-230", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Complexity", "snippet": "- **`O(n)`** time, **`O(h)`** space (`h` = height; `O(n)` worst, `O(log n)` balanced).", "id": "complexity-9", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Empty tree (`root is None`):** return `[]` or `0` immediately — don't recurse into `None`.", "id": "-watch-out-9", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Practice", "snippet": "- Binary Tree Paths (257, pre), Kth Smallest in a BST (230, in), Binary Tree Maximum Path Sum (124, post).", "id": "practice-9", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "11. Depth-First Search (DFS)", "snippet": "> **Mnemonic:** *\"Go deep, hit a wall, back up, try the next door.\"*", "id": "11-depth-first-search-dfs", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Picture", "snippet": "Explore one branch fully before the next. Recursion (or an explicit stack) does this.", "id": "picture-10", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "When to use", "snippet": "- Enumerate **paths**, detect cycles, topological sort, connected components,", "id": "when-to-use-10", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Template — graph DFS with visited set", "snippet": "def dfs(graph, start):", "id": "template--graph-dfs-with-visited-set", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Worked example — Course Schedule II / topological order (LeetCode 210)", "snippet": "Return an order to take courses given prerequisites, or `[]` if impossible (cycle).", "id": "worked-example--course-schedule-ii--topological-order-leetcode-210", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "find_order(2, [[1, 0]]) -> [0, 1]", "snippet": "- **`O(V + E)`** time, **`O(V)`** space (visited + recursion stack).", "id": "find_order2-1-0---0-1", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Complexity", "snippet": "- **`O(V + E)`** time, **`O(V)`** space (visited + recursion stack).", "id": "complexity-10", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Disconnected graph:** a single `dfs(start)` won't visit all nodes — loop over all nodes and start DFS from unvisited", "id": "-watch-out-10", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Practice", "snippet": "- Clone Graph (133), Path Sum II (113), Course Schedule II (210).", "id": "practice-10", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "12. Breadth-First Search (BFS)", "snippet": "> **Mnemonic:** *\"Ripples in a pond — nearest first, level by level.\"*", "id": "12-breadth-first-search-bfs", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Picture", "snippet": "A queue processes everything at distance `d` before distance `d+1` → first time you", "id": "picture-11", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "When to use", "snippet": "- **Shortest path in unweighted** graphs; level-order tree traversal; \"minimum steps\".", "id": "when-to-use-11", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Template", "snippet": "from collections import deque", "id": "template-7", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Worked example — Rotting Oranges (LeetCode 994)", "snippet": "Multi-source BFS: all rotten oranges spread simultaneously; count minutes.", "id": "worked-example--rotting-oranges-leetcode-994", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "oranges_rotting([[2,1,1],[1,1,0],[0,1,1]]) -> 4", "snippet": "- **`O(V + E)`** (grid: `O(m·n)`) time, **`O(V)`** space for the queue.", "id": "oranges_rotting211110011---4", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Complexity", "snippet": "- **`O(V + E)`** (grid: `O(m·n)`) time, **`O(V)`** space for the queue.", "id": "complexity-11", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Source = destination:** return `0` (zero steps), not `-1` — a common off-by-one.", "id": "-watch-out-11", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Practice", "snippet": "- Binary Tree Level Order (102), Rotting Oranges (994), Word Ladder (127).", "id": "practice-11", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "13. Matrix Traversal", "snippet": "> **Mnemonic:** *\"A grid is just a graph — each cell has 4 neighbors.\"*", "id": "13-matrix-traversal", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Picture", "snippet": "Flood fill / island counting = DFS or BFS where moves are up/down/left/right.", "id": "picture-12", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "When to use", "snippet": "- Islands, flood fill, regions, shortest path on a grid, surrounded regions.", "id": "when-to-use-12", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Template — DFS flood fill", "snippet": "def flood_fill(image, sr, sc, new_color):", "id": "template--dfs-flood-fill", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "flood_fill([[1,1,1 et": "def backtrack(choices):", "id": "template-8", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Worked example — Subsets (LeetCode 78)", "snippet": "Every element is either in or out; recurse on the index.", "id": "worked-example--subsets-leetcode-78", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "subsets([1, 2, 3]) -> [[],[1],[1,2],[1,2,3],[1,3],[2],[2,3],[3]]", "snippet": "- Permutations **`O(n·n!)`**, Subsets **`O(n·2^n)`**, general **`O(branch^depth)`**;", "id": "subsets1-2-3---112123132233", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Complexity", "snippet": "- Permutations **`O(n·n!)`**, Subsets **`O(n·2^n)`**, general **`O(branch^depth)`**;", "id": "complexity-13", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Empty input:** `backtrack([])` should return `[[]]` (one empty subset) or `[]` (no permutations) — know the differen", "id": "-watch-out-13", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "Practice", "snippet": "- Permutations (46), Subsets (78), N-Queens (51).", "id": "practice-13", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "15. Bridge to Dynamic Programming", "snippet": "> **Mnemonic:** *\"Backtracking that remembers = DP.\"*", "id": "15-bridge-to-dynamic-programming", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Forgetting base cases:** every DP solution needs at least one base case — `dp[0]`, `dp[0][0]`, etc.", "id": "-watch-out-14", "page": "01-core-patterns.html", "pageTitle": "1 · 15 Core Patterns"}, {"text": "02 — The 20 Dynamic Programming Patterns", "snippet": "> DP = **recursion + memory**. For every pattern below, anchor on the two questions:", "id": "02--the-20-dynamic-programming-patterns", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "1. Fibonacci Sequence", "snippet": "> **Mnemonic:** *\"Today = yesterday + the day before.\"*  · **State:** `dp[i]` · **Recurrence:** `dp[i] = dp[i-1] + dp[i-", "id": "1-fibonacci-sequence", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "stairs, 1 or 2 steps at a time:", "id": "picture", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Climbing Stairs (LeetCode 70), O(1) space", "snippet": "def climb_stairs(n):", "id": "code--climbing-stairs-leetcode-70-o1-space", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "climb_stairs(5) -> 8", "snippet": "**`O(n)`** time, **`O(1)`** space.", "id": "climb_stairs5---8", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n)`** time, **`O(1)`** space.", "id": "complexity", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **`n = 0`:** return `1` (there's 1 way to stand on the ground) or `0` depending on the problem — read carefully.", "id": "-watch-out", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Climbing Stairs (70), Fibonacci Number (509), Min Cost Climbing Stairs (746).", "id": "practice", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "2. Kadane's Algorithm", "snippet": "> **Mnemonic:** *\"Carry the streak only if it helps.\"*  · **State:** best subarray ending at `i` · **Recurrence:** `cur ", "id": "2-kadanes-algorithm", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "nums = [-2, 1, -3, 4, -1, 2, 1, -5, 4]", "id": "picture-1", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Maximum Subarray (LeetCode 53)", "snippet": "def max_subarray(nums):", "id": "code--maximum-subarray-leetcode-53", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "max_subarray([-2,1,-3,4,-1,2,1,-5,4]) -> 6", "snippet": "**`O(n)`** time, **`O(1)`** space.", "id": "max_subarray-21-34-121-54---6", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n)`** time, **`O(1)`** space.", "id": "complexity-1", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **All-negative array:** Kadane still works (`cur = max(x, cur + x)` picks the least-negative) — but if you initialize ", "id": "-watch-out-1", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Maximum Subarray (53), Maximum Sum Circular Subarray (918), Maximum Product Subarray (152).", "id": "practice-1", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "3. 0/1 Knapsack", "snippet": "> **Mnemonic:** *\"Take it or leave it — each item once.\"*  · **State:** `dp[w]` best value at capacity `w` · **Recurrenc", "id": "3-01-knapsack", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "items (wt,val): (1,1) (3,4) (4,5) (5,7)   capacity W=7", "id": "picture-2", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — 1-D rolling array", "snippet": "def knapsack_01(weights, values, W):", "id": "code--1-d-rolling-array", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "knapsack_01([1,3,4,5], [1,4,5,7], 7) -> 9", "snippet": "Can we split into two equal-sum halves? = subset summing to `total/2`.", "id": "knapsack_011345-1457-7---9", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Worked example — Partition Equal Subset Sum (LeetCode 416)", "snippet": "Can we split into two equal-sum halves? = subset summing to `total/2`.", "id": "worked-example--partition-equal-subset-sum-leetcode-416", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "can_partition([1, 5, 11, 5]) -> True", "snippet": "**`O(n·W)`** time, **`O(W)`** space.", "id": "can_partition1-5-11-5---true", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n·W)`** time, **`O(W)`** space.", "id": "complexity-2", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Iterating capacity UPWARD instead of DOWNWARD:** this turns 0/1 into unbounded (each item reused) — the #1 knapsack ", "id": "-watch-out-2", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Partition Equal Subset Sum (416), Target Sum (494), Last Stone Weight II (1049).", "id": "practice-2", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "4. Unbounded Knapsack", "snippet": "> **Mnemonic:** *\"Infinite supply — reuse freely.\"*  · **Recurrence:** `dp[w] = max/min(dp[w], dp[w-wt]+val)` — iterate ", "id": "4-unbounded-knapsack", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "0/1 knapsack:  iterate capacity DOWNWARD (each item once)", "id": "picture-3", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Coin Change (LeetCode 322), fewest coins", "snippet": "def coin_change(coins, amount):", "id": "code--coin-change-leetcode-322-fewest-coins", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "coin_change([1, 2, 5], 11) -> 3   (5 + 5 + 1)", "snippet": "**`O(n·amount)`** time, **`O(amount)`** space.", "id": "coin_change1-2-5-11---3---5--5--1", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n·amount)`** time, **`O(amount)`** space.", "id": "complexity-3", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Iterating capacity DOWNWARD by mistake:** that makes it 0/1 knapsack (each coin used once).", "id": "-watch-out-3", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Coin Change (322), Coin Change II (518), Perfect Squares (279).", "id": "practice-3", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "5. Longest Common Subsequence (LCS)", "snippet": "> **Mnemonic:** *\"Match → diagonal +1; mismatch → best of dropping one.\"*  · **State:** `dp[i][j]` LCS of prefixes · **R", "id": "5-longest-common-subsequence-lcs", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "\"\"  a  c  e", "id": "picture-4", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Longest Common Subsequence (LeetCode 1143)", "snippet": "def lcs(a, b):", "id": "code--longest-common-subsequence-leetcode-1143", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "lcs(\"abcde\", \"ace\") -> 3", "snippet": "Only two rows of the table are ever needed at once. Replace the 2D array with two 1D arrays:", "id": "lcsabcde-ace---3", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Space optimization — rolling row", "snippet": "Only two rows of the table are ever needed at once. Replace the 2D array with two 1D arrays:", "id": "space-optimization--rolling-row", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "lcs_optimized(\"abcde\", \"ace\") -> 3", "snippet": "> This is a common interview follow-up: \"Can you do it in `O(m)` space?\" The answer is always: keep only the previous ro", "id": "lcs_optimizedabcde-ace---3", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Empty strings:** `lcs(\"\", anything)` = 0 — the `range(1, n+1)` loop simply doesn't execute.", "id": "-watch-out-4", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Longest Common Subsequence (1143), Delete Operation for Two Strings (583), Shortest Common Supersequence (1092).", "id": "practice-4", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "6. Longest Increasing Subsequence (LIS)", "snippet": "> **Mnemonic:** *\"Patience sorting — place each card on the leftmost taller pile.\"*  · **State:** `tails[k]` = smallest ", "id": "6-longest-increasing-subsequence-lis", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "nums = [10, 9, 2, 5, 3, 7, 101, 18]", "id": "picture-5", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Longest Increasing Subsequence (LeetCode 300), O(n log n)", "snippet": "import bisect", "id": "code--longest-increasing-subsequence-leetcode-300-on-log-n", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "length_of_lis([10,9,2,5,3,7,101,18]) -> 4", "snippet": "**`O(n log n)`** time, **`O(n)`** space. (The `O(n^2)` DP variant: `dp[i]=max(dp[j]+1)`.)", "id": "length_of_lis109253710118---4", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n log n)`** time, **`O(n)`** space. (The `O(n^2)` DP variant: `dp[i]=max(dp[j]+1)`.)", "id": "complexity-4", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **All-decreasing input:** LIS = 1 (just one element) — `tails` only ever has one entry.", "id": "-watch-out-5", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Longest Increasing Subsequence (300), Number of LIS (673), Russian Doll Envelopes (354).", "id": "practice-5", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "7. Palindromic Subsequence", "snippet": "> **Mnemonic:** *\"Ends match → reach inward +2; else shrink a side.\"*  · **State:** `dp[i][j]` on substring `i..j`.", "id": "7-palindromic-subsequence", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "s = \"bbbab\"   longest palindromic subsequence = \"bbbb\" (len 4)", "id": "picture-6", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Longest Palindromic Subsequence (LeetCode 516)", "snippet": "def longest_palindrome_subseq(s):", "id": "code--longest-palindromic-subsequence-leetcode-516", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "longest_palindrome_subseq(\"bbbab\") -> 4", "snippet": "**`O(n^2)`** time, **`O(n^2)`** space.", "id": "longest_palindrome_subseqbbbab---4", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n^2)`** time, **`O(n^2)`** space.", "id": "complexity-5", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Single character:** always a palindrome of length 1 — `dp[i][i] = 1` base case.", "id": "-watch-out-6", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Longest Palindromic Subsequence (516), Palindromic Substrings (647), Min Insertions to Make Palindrome (1312).", "id": "practice-6", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "8. Edit Distance", "snippet": "> **Mnemonic:** *\"Insert, Delete, Replace — pick the cheapest fix.\"*  · **State:** `dp[i][j]` edits to turn `a[:i]` into", "id": "8-edit-distance", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "\"\"  r  o  s", "id": "picture-7", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Edit Distance (LeetCode 72)", "snippet": "def edit_distance(a, b):", "id": "code--edit-distance-leetcode-72", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "edit_distance(\"horse\", \"ros\") -> 3", "snippet": "Just like LCS, only two rows are needed. Use `prev` and `curr`:", "id": "edit_distancehorse-ros---3", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Space optimization — rolling row", "snippet": "Just like LCS, only two rows are needed. Use `prev` and `curr`:", "id": "space-optimization--rolling-row-1", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "edit_distance_optimized(\"horse\", \"ros\") -> 3", "snippet": "> Interview follow-up: \"Optimize to `O(m)` space.\" Same rolling-row technique as LCS.", "id": "edit_distance_optimizedhorse-ros---3", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **One string empty:** `edit_distance(\"\", \"abc\")` = 3 (insert all) — the base-case row/column handles this.", "id": "-watch-out-7", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Edit Distance (72), Delete Operation for Two Strings (583), Minimum ASCII Delete Sum (712).", "id": "practice-7", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "9. Subset Sum", "snippet": "> **Mnemonic:** *\"Can these numbers hit the target?\"*  · A boolean 0/1-knapsack twin.", "id": "9-subset-sum", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "nums = [3, 34, 4, 12, 5, 2], target = 9", "id": "picture-8", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Subset Sum (equivalent to Partition / Target Sum core)", "snippet": "def subset_sum(nums, target):", "id": "code--subset-sum-equivalent-to-partition--target-sum-core", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "subset_sum([3, 34, 4, 12, 5, 2], 9) -> True", "snippet": "Assign `+`/`-` to each number to reach `target`. Reduces to: subset with sum", "id": "subset_sum3-34-4-12-5-2-9---true", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Worked example — Target Sum (LeetCode 494)", "snippet": "Assign `+`/`-` to each number to reach `target`. Reduces to: subset with sum", "id": "worked-example--target-sum-leetcode-494", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "find_target_sum_ways([1, 1, 1, 1, 1], 3) -> 5", "snippet": "**`O(n·target)`** time, **`O(target)`** space.", "id": "find_target_sum_ways1-1-1-1-1-3---5", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n·target)`** time, **`O(target)`** space.", "id": "complexity-6", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Target = 0:** always `True` (the empty subset sums to 0) — `dp[0] = True` handles this.", "id": "-watch-out-8", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Partition Equal Subset Sum (416), Target Sum (494), Partition to K Equal Sum Subsets (698).", "id": "practice-8", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "10. String Partition", "snippet": "> **Mnemonic:** *\"Cut the string where a piece is valid, recurse on the rest.\"*  · **State:** `dp[i]` over the first `i`", "id": "10-string-partition", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "s = \"leetcode\", words = {leet, code}", "id": "picture-9", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Word Break (LeetCode 139)", "snippet": "def word_break(s, word_dict):", "id": "code--word-break-leetcode-139", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "word_break(\"leetcode\", [\"leet\", \"code\"]) -> True", "snippet": "**`O(n^2)`** (substring hashing aside) time, **`O(n)`** space.", "id": "word_breakleetcode-leet-code---true", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n^2)`** (substring hashing aside) time, **`O(n)`** space.", "id": "complexity-7", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **No valid segmentation:** `dp[n]` stays `False` — make sure you return `False`, not crash.", "id": "-watch-out-9", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Word Break (139), Palindrome Partitioning II (132), Concatenated Words (472).", "id": "practice-9", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "11. Catalan Numbers", "snippet": "> **Mnemonic:** *\"Pick a root/pivot, multiply left × right, sum over all pivots.\"*  · `C(n) = Σ C(i)·C(n-1-i)`.", "id": "11-catalan-numbers", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "Unique BSTs with n nodes:", "id": "picture-10", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Unique Binary Search Trees (LeetCode 96)", "snippet": "def num_trees(n):", "id": "code--unique-binary-search-trees-leetcode-96", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "num_trees(3) -> 5", "snippet": "**`O(n^2)`** time, **`O(n)`** space.", "id": "num_trees3---5", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n^2)`** time, **`O(n)`** space.", "id": "complexity-8", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **`n = 0`:** C(0) = 1 (the empty structure is valid) — don't return 0.", "id": "-watch-out-10", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Unique Binary Search Trees (96), Generate Parentheses (22).", "id": "practice-10", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "12. Matrix Chain Multiplication", "snippet": "> **Mnemonic:** *\"Try every split point on the interval; combine the best.\"*  · **State:** `dp[i][j]` on interval `i..j`", "id": "12-matrix-chain-multiplication", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "For interval [i..j], try each k as the last operation:", "id": "picture-11", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Burst Balloons (LeetCode 312)", "snippet": "Burst balloons last-to-first on each interval; `k` is the **last** balloon burst.", "id": "code--burst-balloons-leetcode-312", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "max_coins([3, 1, 5, 8]) -> 167", "snippet": "**`O(n^3)`** time, **`O(n^2)`** space.", "id": "max_coins3-1-5-8---167", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n^3)`** time, **`O(n^2)`** space.", "id": "complexity-9", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Interval length starts at 2, not 1:** single-element intervals are base cases (cost = 0).", "id": "-watch-out-11", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Min Score Triangulation (1039), Burst Balloons (312), Minimum Cost to Merge Stones (1000).", "id": "practice-11", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "13. Count Distinct Ways", "snippet": "> **Mnemonic:** *\"Sum the ways from every state that can reach me.\"*  · Add (not max) over choices.", "id": "13-count-distinct-ways", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "Decode \"226\": dp[i] = #ways to decode s[:i]", "id": "picture-12", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Decode Ways (LeetCode 91)", "snippet": "def num_decodings(s):", "id": "code--decode-ways-leetcode-91", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "num_decodings(\"226\") -> 3", "snippet": "**`O(n)`** time, **`O(1)`** space.", "id": "num_decodings226---3", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n)`** time, **`O(1)`** space.", "id": "complexity-10", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Leading zeros:** `\"0\"` is invalid as a single-digit decode — `if s[i] == \"0\": cur += 0` (skip).", "id": "-watch-out-12", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Decode Ways (91), Count Number of Texts (2266).", "id": "practice-12", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "14. DP on Grids", "snippet": "> **Mnemonic:** *\"Each cell sums/min's from its top and left neighbor.\"*  · **State:** `dp[r][c]`.", "id": "14-dp-on-grids", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "unique paths (move right/down only):", "id": "picture-13", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Minimum Path Sum (LeetCode 64), O(n) space", "snippet": "def min_path_sum(grid):", "id": "code--minimum-path-sum-leetcode-64-on-space", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "min_path_sum([[1,3,1],[1,5,1],[4,2,1]]) -> 7", "snippet": "**`O(m·n)`** time, **`O(n)`** space (rolling row).", "id": "min_path_sum131151421---7", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(m·n)`** time, **`O(n)`** space (rolling row).", "id": "complexity-11", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Single-row or single-column grid:** only one path exists (all right or all down) — the loop still works, but verify.", "id": "-watch-out-13", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Unique Paths (62), Minimum Path Sum (64), Longest Increasing Path in a Matrix (329).", "id": "practice-13", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "15. DP on Trees", "snippet": "> **Mnemonic:** *\"Post-order: each node returns a small summary to its parent.\"*  · Often returns a tuple of states.", "id": "15-dp-on-trees", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "House Robber III: at each node return (rob_this, skip_this)", "id": "picture-14", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — House Robber III (LeetCode 337)", "snippet": "def rob(root):", "id": "code--house-robber-iii-leetcode-337", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "tree [3,2,3,null,3,null,1] -> 7", "snippet": "**`O(n)`** time, **`O(h)`** space (recursion depth = tree height).", "id": "tree-323null3null1---7", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n)`** time, **`O(h)`** space (recursion depth = tree height).", "id": "complexity-12", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Leaf nodes (no children):** `dfs(None)` returns `(0, 0)` — make sure this base case is correct.", "id": "-watch-out-14", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "House Robber III (337), Binary Tree Maximum Path Sum (124), Binary Tree Cameras (968).", "id": "practice-14", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "16. DP on Graphs", "snippet": "> **Mnemonic:** *\"Relax edges in a valid order; track best-to-reach.\"*  · DAG DP / bounded Bellman-Ford.", "id": "16-dp-on-graphs", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "Cheapest flight with <= K stops: do K+1 rounds of edge relaxation", "id": "picture-15", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Cheapest Flights Within K Stops (LeetCode 787)", "snippet": "def find_cheapest_price(n, flights, src, dst, k):", "id": "code--cheapest-flights-within-k-stops-leetcode-787", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "find_cheapest_price(3, [[0,1,100],[1,2,100],[0,2,500]], 0, 2, 1) -> 200", "snippet": "**`O(K·E)`** time, **`O(V)`** space.", "id": "find_cheapest_price3-011001210002500-0-2-1---200", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(K·E)`** time, **`O(V)`** space.", "id": "complexity-13", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Unreachable destination:** `dist[dst]` stays `INF` — return `-1`.", "id": "-watch-out-15", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Cheapest Flights Within K Stops (787), Find the City With Smallest Number of Neighbors (1334).", "id": "practice-15", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "17. Digit DP", "snippet": "> **Mnemonic:** *\"Build the number digit by digit, hugging the upper bound.\"*  · State carries `(position, tight, ...)`.", "id": "17-digit-dp", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "Count numbers in [0..N] with some digit property:", "id": "picture-16", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Count Numbers with Unique Digits (LeetCode 357)", "snippet": "Equivalent digit-DP-style count of numbers in `[0, 10^n)` with all-distinct digits.", "id": "code--count-numbers-with-unique-digits-leetcode-357", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "count_unique_digits(2) -> 91   (0..99 minus 11,22,...,99)", "snippet": "**`O(L · 2^10 · 2 · 2 · 10)`** ≈ states × transitions; effectively constant in `L`.", "id": "count_unique_digits2---91---099-minus-112299", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(L · 2^10 · 2 · 2 · 10)`** ≈ states × transitions; effectively constant in `L`.", "id": "complexity-14", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Leading zeros (the `started` flag):** `007` is not a valid 3-digit number — skip digit 0 until you've placed a non-z", "id": "-watch-out-16", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Count Numbers with Unique Digits (357), Number of Digit One (233), Numbers At Most N Given Digit Set (902).", "id": "practice-16", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "18. Bitmask DP", "snippet": "> **Mnemonic:** *\"The set of chosen items IS the state — store it in bits.\"*  · For small `n` (≤ ~20).", "id": "18-bitmask-dp", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "mask bits = which elements are used.   n=3:", "id": "picture-17", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Travelling Salesman (Held-Karp) — equivalent to Shortest Path Visiting All Nodes (LeetCode 847 family)", "snippet": "def shortest_tour(dist):", "id": "code--travelling-salesman-held-karp--equivalent-to-shortest-path-visiting-all-nodes-leetcode-847-family", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "shortest_tour([[0,10,15,20],[10,0,35,25],[15,35,0,30],[20,25,30,0]]) -> 80", "snippet": "**`O(2^n · n^2)`** time, **`O(2^n · n)`** space.", "id": "shortest_tour0101520100352515350302025300---80", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(2^n · n^2)`** time, **`O(2^n · n)`** space.", "id": "complexity-15", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **n > 20:** `2^20` = 1M states — already at the limit. `n > 20` means > 1M states × n transitions — too slow.", "id": "-watch-out-17", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Min Work Sessions to Finish Tasks (1986), Fair Distribution of Cookies (2305), Shortest Path Visiting All Nodes (847).", "id": "practice-17", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "19. Probability DP", "snippet": "> **Mnemonic:** *\"A state's probability = sum of (parent prob × transition prob).\"*", "id": "19-probability-dp", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "Knight on a board: prob_alive after k moves", "id": "picture-18", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Knight Probability in Chessboard (LeetCode 688)", "snippet": "def knight_probability(n, k, row, col):", "id": "code--knight-probability-in-chessboard-leetcode-688", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "knight_probability(3, 2, 0, 0) -> 0.0625", "snippet": "**`O(k · n^2 · 8)`** time, **`O(n^2)`** space.", "id": "knight_probability3-2-0-0---00625", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(k · n^2 · 8)`** time, **`O(n^2)`** space.", "id": "complexity-16", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Floating-point precision:** probabilities can get very small — accumulated floating-point error may matter. Usually ", "id": "-watch-out-18", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Knight Probability in Chessboard (688), Soup Servings (808), New 21 Game (837).", "id": "practice-18", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "20. State Machine DP", "snippet": "> **Mnemonic:** *\"You're always in one of a few modes; transitions move you between them.\"*", "id": "20-state-machine-dp", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Picture", "snippet": "Stock with cooldown — three states per day:", "id": "picture-19", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Code — Best Time to Buy and Sell Stock with Cooldown (LeetCode 309)", "snippet": "def max_profit_cooldown(prices):", "id": "code--best-time-to-buy-and-sell-stock-with-cooldown-leetcode-309", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "max_profit_cooldown([1, 2, 3, 0, 2]) -> 3", "snippet": "**`O(n)`** time, **`O(1)`** space.", "id": "max_profit_cooldown1-2-3-0-2---3", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Complexity", "snippet": "**`O(n)`** time, **`O(1)`** space.", "id": "complexity-17", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Ending in the wrong state:** `return max(sold, rest)` — never end while holding stock (that's unrealized value).", "id": "-watch-out-19", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "Practice", "snippet": "Best Time to Buy/Sell with Cooldown (309), Best Time to Buy/Sell Stock III (123).", "id": "practice-19", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "DP pattern selector (use when stuck)", "snippet": "Is it a sequence with f(n)=f(n-1)+...?           -> Fibonacci / Count Ways", "id": "dp-pattern-selector-use-when-stuck", "page": "02-dynamic-programming.html", "pageTitle": "2 · 20 DP Patterns"}, {"text": "03 — Flashcards & Spaced Repetition", "snippet": "> Don't re-read passively — **test yourself**. Cover the answer, say it out loud,", "id": "03--flashcards--spaced-repetition", "page": "03-flashcards.html", "pageTitle": "3 · Flashcards & Review"}, {"text": "Deck A — Trigger → Pattern (recognition)", "snippet": "", "id": "deck-a--trigger--pattern-recognition", "page": "03-flashcards.html", "pageTitle": "3 · Flashcards & Review"}, {"text": "Deck B — Pattern → Complexity (cold recall)", "snippet": "", "id": "deck-b--pattern--complexity-cold-recall", "page": "03-flashcards.html", "pageTitle": "3 · Flashcards & Review"}, {"text": "Deck C — DP recurrences (the one line that matters)", "snippet": "", "id": "deck-c--dp-recurrences-the-one-line-that-matters", "page": "03-flashcards.html", "pageTitle": "3 · Flashcards & Review"}, {"text": "Deck D — Concept checks (say the full answer)", "snippet": "1. **Q:** Why iterate capacity *downward* in 0/1 knapsack but *upward* in unbounded?", "id": "deck-d--concept-checks-say-the-full-answer", "page": "03-flashcards.html", "pageTitle": "3 · Flashcards & Review"}, {"text": "Spaced-repetition schedule", "snippet": "The forgetting curve is steep — review at expanding intervals to flatten it.", "id": "spaced-repetition-schedule", "page": "03-flashcards.html", "pageTitle": "3 · Flashcards & Review"}, {"text": "04 — Advanced Patterns (Bonus)", "snippet": "> Two graph patterns that appear constantly in interviews but don't fit neatly", "id": "04--advanced-patterns-bonus", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "A. Dijkstra's Algorithm", "snippet": "> **Mnemonic:** *\"Always pick the cheapest unvisited node — greedy BFS with a price tag.\"*", "id": "a-dijkstras-algorithm", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "Picture", "snippet": "BFS uses a plain queue (FIFO) → shortest by *edge count*.", "id": "picture", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "When to use", "snippet": "- **Shortest path** in a **weighted graph with non-negative edges**.", "id": "when-to-use", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "Template", "snippet": "import heapq", "id": "template", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "Worked example — Network Delay Time (LeetCode 743)", "snippet": "How long until all nodes receive a signal sent from node `k`?", "id": "worked-example--network-delay-time-leetcode-743", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "network_delay_time([[2,1,1],[2,3,1],[3,4,1]], 4, 2) -> 2", "snippet": "- **`O((V + E) log V)`** time (each edge relaxation = heap push), **`O(V + E)`** space.", "id": "network_delay_time211231341-4-2---2", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "Complexity", "snippet": "- **`O((V + E) log V)`** time (each edge relaxation = heap push), **`O(V + E)`** space.", "id": "complexity", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Negative edges break Dijkstra.** If edges can be negative, use Bellman-Ford instead.", "id": "-watch-out", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "Practice", "snippet": "- Network Delay Time (743), Path with Minimum Effort (1631), Swim in Rising Water (778).", "id": "practice", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "B. Union-Find (Disjoint Set Union)", "snippet": "> **Mnemonic:** *\"Every group has a boss; to merge, just change one boss.\"*", "id": "b-union-find-disjoint-set-union", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "Picture", "snippet": "Initially: each element is its own parent.", "id": "picture-1", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "When to use", "snippet": "- **\"Are X and Y connected?\"** — connected components, cycle detection in undirected graphs.", "id": "when-to-use-1", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "Template — with path compression + union by rank", "snippet": "class UnionFind:", "id": "template--with-path-compression--union-by-rank", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "Worked example — Redundant Connection (LeetCode 684)", "snippet": "Find the edge that, if removed, makes the graph a tree (= no cycle).", "id": "worked-example--redundant-connection-leetcode-684", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "find_redundant_connection([[1,2],[1,3],[2,3]]) -> [2,3]", "snippet": "- **`O(α(n))`** amortized per `find`/`union` (α = inverse Ackermann, effectively constant), **`O(n)`** space.", "id": "find_redundant_connection121323---23", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "Complexity", "snippet": "- **`O(α(n))`** amortized per `find`/`union` (α = inverse Ackermann, effectively constant), **`O(n)`** space.", "id": "complexity-1", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "⚠️ Watch out", "snippet": "- **Directed graphs:** standard Union-Find is for *undirected* connectivity. For directed graphs, use DFS / Tarjan's / K", "id": "-watch-out-1", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "Practice", "snippet": "- Number of Connected Components (323), Redundant Connection (684), Accounts Merge (721), Kruskal's MST (1584 — Min Cost", "id": "practice-1", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "When Dijkstra vs BFS vs Bellman-Ford?", "snippet": "Unweighted graph?                   → BFS             O(V + E)", "id": "when-dijkstra-vs-bfs-vs-bellman-ford", "page": "04-advanced-patterns.html", "pageTitle": "4 · Advanced Patterns"}, {"text": "05 — Progress Tracker", "snippet": "> **How to use:** Copy this file or edit it directly. Change `☐` to `☑` as you", "id": "05--progress-tracker", "page": "05-progress-tracker.html", "pageTitle": "5 · Progress Tracker"}, {"text": "Core Patterns (from `01-core-patterns.md`)", "snippet": "", "id": "core-patterns-from-01-core-patternsmd", "page": "05-progress-tracker.html", "pageTitle": "5 · Progress Tracker"}, {"text": "DP Patterns (from `02-dynamic-programming.md`)", "snippet": "", "id": "dp-patterns-from-02-dynamic-programmingmd", "page": "05-progress-tracker.html", "pageTitle": "5 · Progress Tracker"}, {"text": "Advanced Patterns (from `04-advanced-patterns.md`)", "snippet": "", "id": "advanced-patterns-from-04-advanced-patternsmd", "page": "05-progress-tracker.html", "pag
